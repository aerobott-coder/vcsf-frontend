steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICENAME}/$BRANCH_NAME:${_ENV}'
      - '--build-arg'
      - 'VITE_API_URL=${_VITE_API_URL}'
      - '--build-arg'
      - 'VITE_APP_NAME=VCSF'
      - '--build-arg'
      - 'VITE_APP_VERSION=1.0.0'
      - '--build-arg'
      - 'VITE_ENVIRONMENT=production'
      - '.'
    id: Docker Build

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICENAME}/$BRANCH_NAME:${_ENV}']
    id: Push Image

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICENAME}-${_ENV}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICENAME}/$BRANCH_NAME:${_ENV}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
    id: Deploy

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICENAME}/$BRANCH_NAME:${_ENV}'

options:
  logging: CLOUD_LOGGING_ONLY
